name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -ldflags "-X main.version=ci" -o yesmem .

      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test ./... -count=1 -timeout 120s
